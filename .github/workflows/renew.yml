name: ACLClouds Auto Renew

on:
  schedule:
    - cron: '16 */5 * * *'
  workflow_dispatch:

jobs:
  renew-job:
    runs-on: ubuntu-latest
    # 赋予工作流删除历史运行记录的权限
    permissions:
      actions: write
      contents: read
      
    steps:
      # 1. 拉取当前的公共仓库（包含此工作流所在的仓库）
      - name: Checkout Public Repository
        uses: actions/checkout@v4

      # 2. 核心步骤：拉取存放私密脚本的私有仓库
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          # 👇【请将此处替换为您真实的：GitHub用户名/私有仓库名】
          repository: 'vipcd/zhuanshu-jiaoben' 
          # 👇 使用存放在公共仓库 Secrets 中的 PAT 令牌进行鉴权
          token: ${{ secrets.PAT_FOR_PRIVATE_REPO }}
          # 👇 将私库的代码克隆到单独的子独立文件夹中，避免污染根目录
          path: private_code

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      # 3. 运行私库中指定更名后的脚本
      - name: Run Renew Script
        env:
          ACL_COOKIES: ${{ secrets.ACL_COOKIES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 👇 路径指定为私库克隆目录下的新脚本名
        run: python private_code/aclclouds_renew.py

      # 将生成的截图上传到 GitHub Actions 页面（脚本运行时截图仍会生成在根目录下）
      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: Debug-Screenshots
          path: "*.png" 
          retention-days: 5 

      # 自动清理超过 2 天的旧运行记录
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 2
          keep_minimum_runs: 0
