name: ACLClouds Auto Renew

on:
  schedule:
    - cron: '16 */5 * * *'
  workflow_dispatch:

jobs:
  renew-job:
    runs-on: ubuntu-latest
    # 赋予工作流删除历史运行记录的权限
    permissions:
      actions: write
      contents: read
      
    steps:
      # 1. 拉取当前的公共仓库
      - name: Checkout Public Repository
        uses: actions/checkout@v4

      # 2. 拉取存放私密脚本的私有仓库
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          # 👇【注意：请记得将此处保持为您真实的：GitHub用户名/私有仓库名】
          repository: 'YOUR_GITHUB_USERNAME/YOUR_PRIVATE_REPO_NAME' 
          token: ${{ secrets.PAT_FOR_PRIVATE_REPO }}
          path: private_code

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      # 3. 运行私库中命名前缀加上 aclclouds 的核心脚本
      - name: Run Renew Script
        env:
          ACL_COOKIES: ${{ secrets.ACL_COOKIES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python private_code/aclclouds_renew.py

      # 将生成的截图上传到 GitHub Actions 页面
      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: Debug-Screenshots
          path: "*.png" 
          retention-days: 5 

      # 【核心修改步骤】：由保留天数改为“始终只保留最新的 2 条历史记录”
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always() # 无论成功或失败，都执行清理
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0           # 设为 0，代表不以时间为过滤条件
          keep_minimum_runs: 2     # 强制彻底清理，有且仅保留最新 2 条记录
